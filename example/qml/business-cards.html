<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名片展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 40px;
            font-weight: 600;
            font-size: 28px;
        }
        .section {
            margin-bottom: 60px;
        }
        .section-title {
            text-align: center;
            color: #1a202c;
            margin-bottom: 30px;
            font-weight: 500;
            font-size: 20px;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card-wrapper {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-wrapper:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }
        .card-wrapper img {
            display: block;
            width: 230px;
            height: 130px;
            border-radius: 8px;
        }
        .card-info {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
        .dark-section {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            margin: 0 -20px;
            border-radius: 20px;
        }
        .dark-section .section-title {
            color: #f8fafc;
        }
        .dark-section .card-wrapper {
            background: #1e293b;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .dark-section .card-wrapper:hover {
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }
        .dark-section .card-info {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>名片展示</h1>

    <div class="section">
        <h2 class="section-title">浅色模式</h2>
        <div class="cards-container">
            <div class="card-wrapper">
                <img src="temp/huOhS.png" alt="周杰">
                <div class="card-info">周杰 - 技术总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/uTZ3l.png" alt="李明">
                <div class="card-info">李明 - 软件工程师</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/FLOMT.png" alt="王芳">
                <div class="card-info">王芳 - 设计总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/JxSWC.png" alt="张伟">
                <div class="card-info">张伟 - 市场经理</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/Lhp0r.png" alt="陈静">
                <div class="card-info">陈静 - 财务总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/DgCrw.png" alt="刘洋">
                <div class="card-info">刘洋 - 运营总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/479Ln.png" alt="赵磊">
                <div class="card-info">赵磊 - 产品总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/0oRSF.png" alt="孙丽">
                <div class="card-info">孙丽 - HR经理</div>
            </div>
        </div>
    </div>

    <div class="dark-section">
        <h2 class="section-title">深色模式</h2>
        <div class="cards-container">
            <div class="card-wrapper">
                <img src="temp/dark/Q4L7g.png" alt="林浩然">
                <div class="card-info">林浩然 - 首席架构师</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/4ePE2.png" alt="马超">
                <div class="card-info">马超 - 安全专家</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/SXXog.png" alt="吴婷">
                <div class="card-info">吴婷 - 数据分析师</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/m8p9s.png" alt="郑强">
                <div class="card-info">郑强 - 前端Leader</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/nKr1L.png" alt="冯雪">
                <div class="card-info">冯雪 - 品牌总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/1rtqt.png" alt="陈龙">
                <div class="card-info">陈龙 - DevOps</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/nbIC5.png" alt="褚亮">
                <div class="card-info">褚亮 - 测试总监</div>
            </div>
            <div class="card-wrapper">
                <img src="temp/dark/csf3D.png" alt="卫华">
                <div class="card-info">卫华 - CTO</div>
            </div>
        </div>
    </div>
</body>
</html>
